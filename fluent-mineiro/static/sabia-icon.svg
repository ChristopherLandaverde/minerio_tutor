<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#C0582B"/>

  <!-- Bird body — sabiá shape -->
  <!-- Main body (warm brown/cream belly like real sabiá) -->
  <ellipse cx="260" cy="280" rx="95" ry="75" fill="#FBF7F0" transform="rotate(-10 260 280)"/>

  <!-- Back/wing (olive-green like real sabiá) -->
  <ellipse cx="245" cy="260" rx="85" ry="55" fill="#2D6A4F" transform="rotate(-15 245 260)"/>

  <!-- Wing detail -->
  <path d="M185 235 C 200 210, 280 200, 310 240 C 290 225, 220 225, 185 235Z" fill="#1B4332"/>

  <!-- Head -->
  <circle cx="310" cy="210" r="45" fill="#3D2B1F"/>

  <!-- Eye (white circle + dark pupil) -->
  <circle cx="325" cy="200" r="14" fill="white"/>
  <circle cx="328" cy="198" r="8" fill="#1A1410"/>
  <circle cx="331" cy="195" r="3" fill="white"/>

  <!-- Beak (golden like ouro accent) -->
  <path d="M350 210 L 385 205 L 355 222Z" fill="#D4A843"/>

  <!-- Belly highlight (rufous/orange like sabiá-laranjeira) -->
  <ellipse cx="270" cy="310" rx="60" ry="40" fill="#D4743F" opacity="0.6" transform="rotate(-5 270 310)"/>

  <!-- Tail feathers -->
  <path d="M155 290 C 130 310, 110 340, 120 370 C 135 350, 150 330, 170 310Z" fill="#2D6A4F"/>
  <path d="M160 300 C 125 325, 100 360, 105 390 C 125 365, 148 340, 175 315Z" fill="#1B4332"/>

  <!-- Legs -->
  <line x1="240" y1="345" x2="230" y2="395" stroke="#6B5B4F" stroke-width="6" stroke-linecap="round"/>
  <line x1="275" y1="348" x2="270" y2="395" stroke="#6B5B4F" stroke-width="6" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M215 395 L 230 395 L 245 390" stroke="#6B5B4F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M255 395 L 270 395 L 285 390" stroke="#6B5B4F" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Musical note (songbird!) -->
  <g transform="translate(370, 145) scale(0.8)" fill="#D4A843">
    <circle cx="0" cy="20" r="10"/>
    <rect x="8" y="-25" width="4" height="45"/>
    <path d="M12 -25 C 12 -25, 30 -35, 30 -15 C 30 -5, 12 -10, 12 -5" fill="#D4A843"/>
  </g>
</svg>
